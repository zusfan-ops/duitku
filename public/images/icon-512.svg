<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5A27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4A8A3F;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DC572;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" ry="120" fill="url(#bg-grad)" filter="url(#shadow)"/>
  
  <circle cx="410" cy="100" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="80" cy="430" r="200" fill="rgba(255,255,255,0.04)"/>

  <circle cx="256" cy="220" r="120" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>

  <text x="256" y="200" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800"
        fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2">Rp</text>

  <rect x="186" y="228" width="140" height="8" rx="4" fill="rgba(255,255,255,0.6)"/>

  <g transform="translate(340, 296)">
    <circle r="46" fill="url(#leaf-grad)" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    <polyline points="-15,15 0,-15 15,15" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-15" x2="0" y2="20" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>

  <text x="256" y="400" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="2" opacity="0.95">DuitKu</text>
</svg>
