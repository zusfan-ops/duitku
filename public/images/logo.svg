<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5A27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4A8A3F;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DC572;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="48" ry="48" fill="url(#bg-grad)" filter="url(#shadow)"/>

  <!-- Subtle pattern overlay -->
  <circle cx="160" cy="40" r="60" fill="rgba(255,255,255,0.05)"/>
  <circle cx="30" cy="170" r="80" fill="rgba(255,255,255,0.04)"/>

  <!-- Coin / Rupiah symbol base -->
  <circle cx="100" cy="98" r="52" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Rupiah "Rp" stylized as coin -->
  <text x="100" y="90" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800"
        fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-1">Rp</text>

  <!-- Underline / separator -->
  <rect x="72" y="101" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.6)"/>

  <!-- Leaf / growth arrow (bottom right of coin) -->
  <g transform="translate(134, 130)">
    <circle r="18" fill="url(#leaf-grad)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Arrow up (growth) -->
    <polyline points="-6,6 0,-6 6,6" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-6" x2="0" y2="8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- App name below coin -->
  <text x="100" y="168" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800"
        fill="white" text-anchor="middle" letter-spacing="1" opacity="0.95">DuitKu</text>
</svg>
